[package]
name = "vmgstool"
version = "2.0.0"
edition.workspace = true
rust-version.workspace = true

[features]
default = []

encryption = ["vmgs/encryption", "crypto/vendored"]

test_helpers = ["vmgs/test_helpers", "getrandom", "dep:resource_dll_parser"]

# run encryption unit tests in CI
ci = ["encryption"]

[dependencies]
disk_backend.workspace = true
disk_vhd1.workspace = true
uefi_nvram_storage.workspace = true
guid.workspace = true
hcl_compat_uefi_nvram_storage.workspace = true
pal_async.workspace = true
uefi_nvram_specvars.workspace = true
uefi_specs.workspace = true
vmgs.workspace = true
vmgs_format.workspace = true

anyhow.workspace = true
async-trait.workspace = true
clap = { workspace = true, features = ["derive"] }
crypto = { workspace = true, optional = true }
hex.workspace = true
fs-err.workspace = true
getrandom = { workspace = true, optional = true}
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true, features = ["std"] }
thiserror.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
ucs2.workspace = true
resource_dll_parser = { workspace = true, optional = true }

[dev-dependencies]
tempfile.workspace = true

[lints]
workspace = true

[package.metadata.xtask.unused-deps]
# keep the crypto dep so we can specify the vendored feature
ignored = ["crypto"]
